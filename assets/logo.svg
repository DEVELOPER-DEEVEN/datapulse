<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="250" cy="250" r="240" stroke="#1E293B" stroke-width="20" fill="#0F172A"/>
  
  <!-- Pulse Line -->
  <path d="M100 250H180L210 150L250 350L290 200L320 250H400" stroke="#3B82F6" stroke-width="25" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Data Node -->
  <circle cx="250" cy="250" r="40" fill="#3B82F6">
    <animate attributeName="r" values="35;45;35" dur="2s" repeatCount="indefinite" />
    <animate attributeName="fill" values="#3B82F6;#60A5FA;#3B82F6" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Integrity Ring -->
  <circle cx="250" cy="250" r="60" stroke="#60A5FA" stroke-width="5" stroke-dasharray="10 10"/>
</svg>
